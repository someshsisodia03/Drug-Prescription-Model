<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Smart Prescription AI - AI-Powered Medicine Recommendations</title>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#2563eb" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />

    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <!-- Icons -->
    <link rel="icon" type="image/png" href="/icons/icon-192.png" />

    <!-- SEO -->
    <meta name="description" content="Get intelligent medicine recommendations using advanced AI analysis of symptoms, patient data, and safety profiles. Professional healthcare decision support system." />
    <meta name="author" content="Smart Prescription AI" />
    <meta name="keywords" content="AI prescription, medicine recommendation, healthcare AI, symptom analysis, drug safety, medical AI" />
    <meta property="og:title" content="Smart Prescription AI - AI-Powered Medicine Recommendations" />

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Register Service Worker for PWA
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/sw.js").then(
            (reg) => console.log("SW registered:", reg.scope),
            (err) => console.log("SW registration failed:", err)
          );
        });
      }
    </script>
  </body>
