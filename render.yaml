services:
  # Backend — Flask API
  - type: web
    name: drug-prescription-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"

  # Frontend — Vite Static Site
  - type: web
    name: drug-prescription-frontend
    runtime: static
    rootDir: smart-health-advisor
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    plan: free
    envVars:
      - key: VITE_BACKEND_URL
        value: https://drug-prescription-backend.onrender.com
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
